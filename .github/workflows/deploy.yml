name: Deploy to GitHub Pages

# Build both Vite apps and publish them to GitHub Pages on every push to main:
#   /         → ميثاق Mithaq   (mithaq/)
#   /ghabti/  → غابتي Ghabti   (ghabti/, formerly /forest-rental/ — old URL redirects)
# Both apps use `base: './'`, so their assets resolve correctly under any subpath.
# نزل Nuzul (nuzul/) deploys separately via Vercel.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            mithaq/package-lock.json
            ghabti/package-lock.json

      # ---- Mithaq → site root ----
      - name: Install dependencies (Mithaq)
        run: npm ci
        working-directory: mithaq

      - name: Build Mithaq
        run: npm run build
        working-directory: mithaq

      - name: Stage Mithaq at site root
        run: |
          mkdir -p _site
          cp -r mithaq/dist/. _site/

      # ---- Ghabti → /ghabti ----
      - name: Install dependencies (Ghabti)
        run: npm ci
        working-directory: ghabti

      - name: Build Ghabti
        run: npm run build
        working-directory: ghabti

      - name: Stage Ghabti at /ghabti
        run: |
          mkdir -p _site/ghabti
          cp -r ghabti/dist/. _site/ghabti/

      # Old Ghabti URL keeps working: /forest-rental/ → /ghabti/
      - name: Redirect old forest-rental URL
        run: |
          mkdir -p _site/forest-rental
          cat > _site/forest-rental/index.html <<'HTML'
          <!doctype html>
          <html lang="ar" dir="rtl">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=../ghabti/">
            <title>غابتي — العنوان الجديد</title>
          </head>
          <body>
            <p>انتقلت غابتي إلى عنوان جديد — <a href="../ghabti/">اضغط هنا</a></p>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
