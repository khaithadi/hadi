name: Deploy to GitHub Pages

# Build both Vite apps and publish them to GitHub Pages on every push to main:
#   /                → ميثاق Mithaq   (root app)
#   /forest-rental/  → غابتي Ghabti   (forest & villa rental app)
# Both apps use `base: './'`, so their assets resolve correctly under any subpath.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---- Mithaq (root app) → site root ----
      - name: Install dependencies (Mithaq)
        run: npm ci

      - name: Build Mithaq
        run: npm run build

      - name: Stage Mithaq at site root
        run: |
          mkdir -p _site
          cp -r dist/. _site/

      # ---- Ghabti (forest-rental) → /forest-rental ----
      - name: Install dependencies (Ghabti)
        run: npm ci
        working-directory: forest-rental

      - name: Build Ghabti
        run: npm run build
        working-directory: forest-rental

      - name: Stage Ghabti at /forest-rental
        run: |
          mkdir -p _site/forest-rental
          cp -r forest-rental/dist/. _site/forest-rental/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
